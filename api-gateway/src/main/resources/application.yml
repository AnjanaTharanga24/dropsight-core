server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: product-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/products/**

        - id: notification-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/notifications/**

        - id: monitoring-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/monitoring/**

management:
  endpoints:
    web:
      exposure:
        include: health,info